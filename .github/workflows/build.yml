name: Build & release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint
        run: |
          go tool golangci-lint run
          go tool govulncheck ./...
          go tool nilaway ./...

      - name: Run tests
        run: go test -race -v ./...

  release:
    name: Build & Release
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build for Linux (AMD64)
        run: go build -v -o markdown-github-stars-updater-linux-amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0

      - name: Build for Linux (ARM64)
        run: go build -v -o markdown-github-stars-updater-linux-arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0

      - name: Build for Windows
        run: go build -v -o markdown-github-stars-updater-windows-amd64.exe
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0

      - name: Build for MacOS (AMD64)
        run: go build -v -o markdown-github-stars-updater-darwin-amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0

      - name: Build for MacOS (ARM64)
        run: go build -v -o markdown-github-stars-updater-darwin-arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            markdown-github-stars-updater-linux-amd64
            markdown-github-stars-updater-linux-arm64
            markdown-github-stars-updater-windows-amd64.exe
            markdown-github-stars-updater-darwin-amd64
            markdown-github-stars-updater-darwin-arm64
